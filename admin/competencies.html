<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmeval — Banque des compétences</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.30.0/tabler-icons.min.css">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="competencies-loading">Vérification des droits d'accès…</div>

<div id="competencies-denied" style="display:none;">
  <div class="admin-modal" style="max-width:480px;margin:60px auto;">
    <h2>Accès refusé</h2>
    <p>La gestion de la banque des compétences est réservée aux administrateurs.</p>
    <div class="btn-row">
      <a class="btn-primary" href="../index.html">Retour à l'accueil</a>
    </div>
  </div>
</div>

<!-- Reutilise le meme style que la Banque de questions / Parcours :
     memes classes CSS (.bank-*), meme disposition deux colonnes. -->
<div id="site-header-mount"></div>

<div id="competencies-view" style="display:none;">
  <div class="bank-page">
    <div class="bank-header">
      <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1"/></svg> Banque des compétences</h2>
      <div class="btn-row" style="margin:0;">
        <a href="parcours.html" class="btn-secondary"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="3" x2="8" y2="21"/><line x1="12" y1="7" x2="17" y2="7"/><line x1="12" y1="11" x2="17" y2="11"/><line x1="12" y1="15" x2="16" y2="15"/></svg> Parcours</a>
        <a href="../index.html?admin=1" class="btn-secondary">← Retour à l'administration</a>
      </div>
    </div>

    <div id="competencies-message" class="admin-message" style="display:none;"></div>

    <!-- BARRE D'OUTILS : recherche seule (CORRECTIF : filtres/tri manuels,
         création et migration retirés - tout le contenu vient désormais
         exclusivement de l'import Excel). -->
    <div class="bank-toolbar">
      <input type="text" id="competencies-search-input" class="admin-users-search-input bank-search-input"
             placeholder="Rechercher (nom, description, catégorie, mot-clé)…"
             oninput="onCompetenciesSearchInput()">
      <button class="btn-primary" onclick="requestBulkPublishCompetencies()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="9"/><path d="m8 12 2.5 2.5L16 9"/></svg> Publier toutes les compétences en brouillon</button>
    </div>

    <div id="competencies-search-disclaimer" class="admin-users-disclaimer" style="display:none;"></div>

    <!-- DEUX COLONNES -->
    <div class="bank-columns">

      <!-- COLONNE GAUCHE : liste -->
      <div class="bank-list-column">
        <div id="competencies-list-empty" class="bank-list-empty" style="display:none;"></div>
        <div id="competencies-list" class="bank-list"></div>
        <div id="competencies-pagination" class="bank-pagination"></div>
      </div>

      <!-- COLONNE DROITE : fiche détaillée -->
      <div class="bank-detail-column">
        <div id="competencies-detail-placeholder" class="bank-detail-placeholder">
          Sélectionnez une compétence dans la liste pour afficher sa fiche complète.
        </div>
        <div id="competencies-detail" class="bank-detail" style="display:none;"></div>
      </div>

    </div>
  </div>
</div>

<!-- CONFIRMATION AVANT ACTION SENSIBLE -->
<div id="competencies-confirm-overlay" class="admin-modal-overlay" style="display:none;">
  <div class="admin-modal admin-confirm-modal">
    <h3>Confirmation</h3>
    <p id="competencies-confirm-message"></p>
    <div class="btn-row">
      <button class="btn-secondary" onclick="cancelCompetencyAction()">Annuler</button>
      <button class="btn-primary" id="competencies-confirm-btn" onclick="confirmCompetencyAction()">Confirmer</button>
    </div>
  </div>
</div>

<script type="module" src="competencies.js"></script>

</body>
</html>
